<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Account | Arabic Luxury Store</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #1A1A1A;
            --card-bg: #262626;
            --text-light: #F5F5F5;
            --text-muted: #A0A0A0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .register-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-gold);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary-gold);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary-gold);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-gold);
            border: none;
            border-radius: 6px;
            color: var(--dark-bg);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #f3cb46;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .switch-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .switch-link a {
            color: var(--primary-gold);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="register-container">
        <h2>Create New Account</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Username *</label>
                <input type="text" id="userName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" placeholder="Create a secure password" required>
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <textarea id="address" rows="2" placeholder="Street, City, Country"></textarea>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phonenu" placeholder="e.g., +966500000000">
            </div>
            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob">
            </div>
            <button type="submit">Register Account</button>
        </form>
        <div id="msg" class="message"></div>
        <div class="switch-link">
            <p>Already have an account? <a href="../auth/login.html">Login here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                userName: document.getElementById('userName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value,
                phonenu: document.getElementById('phonenu').value,
                dob: document.getElementById('dob').value
            };

            const msgDiv = document.getElementById('msg');
            msgDiv.textContent = 'Registering your account...';
            msgDiv.style.color = 'var(--text-muted)';

            try {
                const response = await fetch('../api/register_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    msgDiv.style.color = '#4BB543';
                    msgDiv.textContent = result.message + ' Redirecting to login...';
                    document.getElementById('registerForm').reset();

                    setTimeout(() => {
                        window.location.href = '../auth/login.html';
                    }, 2000);
                } else {
                    msgDiv.style.color = '#FF3333';
                    msgDiv.textContent = result.message;
                }
            } catch (error) {
                msgDiv.style.color = '#FF3333';
                msgDiv.textContent = 'A network error occurred connection to the server.';
            }
        });
    </script>
</body>

</html>

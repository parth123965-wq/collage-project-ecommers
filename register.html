<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستخدم جديد | Arabic Luxury Store</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #1A1A1A;
            --card-bg: #262626;
            --text-light: #F5F5F5;
            --text-muted: #A0A0A0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .register-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--primary-gold);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary-gold);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary-gold);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-gold);
            border: none;
            border-radius: 6px;
            color: var(--dark-bg);
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #f3cb46;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="register-container">
        <h2>إنشاء حساب جديد (Register)</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>اسم المستخدم *</label>
                <input type="text" id="userName" required>
            </div>
            <div class="form-group">
                <label>البريد الإلكتروني *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور *</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>العنوان</label>
                <textarea id="address" rows="2"></textarea>
            </div>
            <div class="form-group">
                <label>رقم الهاتف</label>
                <input type="text" id="phonenu">
            </div>
            <div class="form-group">
                <label>تاريخ الميلاد</label>
                <input type="date" id="dob">
            </div>
            <button type="submit">تسجيل الحساب</button>
        </form>
        <div id="msg" class="message"></div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Stop page from reloading

            const data = {
                userName: document.getElementById('userName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                address: document.getElementById('address').value,
                phonenu: document.getElementById('phonenu').value,
                dob: document.getElementById('dob').value
            };

            const msgDiv = document.getElementById('msg');
            msgDiv.textContent = 'جاري التسجيل...';

            try {
                const response = await fetch('register_api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    msgDiv.style.color = '#4BB543';
                    msgDiv.textContent = result.message;
                    document.getElementById('registerForm').reset();
                    // We will add redirection to login page here later!
                } else {
                    msgDiv.style.color = '#FF3333';
                    msgDiv.textContent = result.message;
                }
            } catch (error) {
                msgDiv.style.color = '#FF3333';
                msgDiv.textContent = 'حدث خطأ في الاتصال بالسيرفر.';
            }
        });
    </script>
</body>

</html>
